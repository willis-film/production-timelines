<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Timeline Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #08212D;
    --paper: #FEFBF5;
    --warm: #08212D;
    --warm-text: #ffffff;
    --accent: #67E74E;
    --accent-light: #FBECEB;
    --rule: #c8bfaa;
    --warm-rule: rgba(233, 240, 251, 0.2);
    --muted: #5a7a8a;
    --warm-muted: rgba(255, 255, 255, 0.65);
    --phase-1: #44a55d;
    --phase-2: #367ed4;
    --phase-3: #d83a31;
    --phase-4: #FFB21B;
    --phase-5: #67E74E;
    --phase-6: #08212D;
    --font-mono: Verdana, sans-serif;
    --font-serif: Verdana, sans-serif;
    --phase-3: #2a5a7c;
    --phase-4: #7c4a2a;
    --phase-5: #5a4a7c;
    --phase-6: #7c6a2a;
  }

  body {
    font-family: Verdana, sans-serif;
    background: #ffffff;
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1.25rem;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: var(--font-serif);
    font-size: 2.4rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  header p {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── FORM ── */
  .form-section {
    background: var(--warm);
    border: 1px solid var(--warm-rule);
    padding: 1.75rem;
    margin-bottom: 2rem;
  }

  .form-section h2 {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    color: var(--warm-muted);
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .field-row.single { grid-template-columns: 1fr; }
  .field-row.triple { grid-template-columns: 1fr 1fr 1fr; }

  label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-muted);
    margin-bottom: 0.35rem;
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  select {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--warm-rule);
    border-radius: 0;
    padding: 0.5rem 0.65rem;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--warm-text);
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }

  input::placeholder { color: rgba(233,240,251,0.35); }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  /* ── PHASES TABLE ── */
  .phases-header {
    display: grid;
    grid-template-columns: 2fr 1fr auto;
    gap: 0.5rem;
    padding: 0 0 0.4rem;
    border-bottom: 1px solid var(--warm-rule);
    margin-bottom: 0.5rem;
  }

  .phases-header span {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-muted);
  }

  .phase-row {
    display: grid;
    grid-template-columns: 2fr 1fr auto;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.45rem;
  }

  .phase-color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.4rem;
    flex-shrink: 0;
  }

  .phase-name-wrap {
    display: flex;
    align-items: center;
  }

  .phase-name-wrap input {
    flex: 1;
  }

  .btn-remove {
    background: none;
    border: 1px solid var(--warm-rule);
    color: var(--warm-muted);
    cursor: pointer;
    padding: 0.4rem 0.55rem;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    transition: all 0.15s;
    line-height: 1;
  }

  .btn-remove:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-add {
    background: none;
    border: 1px dashed var(--warm-rule);
    color: var(--warm-muted);
    cursor: pointer;
    padding: 0.55rem 1rem;
    font-size: 0.72rem;
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: 100%;
    margin-top: 0.5rem;
    transition: all 0.15s;
  }

  .btn-add:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(103,231,78,0.08);
  }

  .btn-generate {
    background: var(--accent);
    color: var(--ink);
    border: none;
    padding: 0.85rem 2rem;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    margin-top: 1.5rem;
    transition: background 0.15s;
  }

  .btn-generate:hover {
    background: #7fff6a;
  }

  /* ── DELIVERABLE CHECKBOXES ── */
  .deliverable-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
  }

  .deliverable-check {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    padding: 0.4rem 0.5rem;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .deliverable-check:hover {
    border-color: var(--warm-rule);
    background: rgba(255,255,255,0.05);
  }

  .deliverable-check input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .deliverable-check span {
    font-size: 0.72rem;
    color: var(--warm-text);
  }

  /* ── WARNING BANNER ── */
  /* ── OUTPUT ── */
  #output {
    display: none;
  }

  #output.visible {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 0.75rem;
    margin-bottom: 0.25rem;
  }

  .output-header h2 {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 300;
  }

  .output-header .project-meta {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.06em;
  }

  .deliverables-note {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    padding: 0.4rem 0 1.25rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
  }

  .timeline-list {
    list-style: none;
  }

  .milestone {
    display: grid;
    grid-template-columns: 130px 1fr;
    border-bottom: 1px solid var(--rule);
    padding: 0;
    position: relative;
  }

  .milestone:last-child {
    border-bottom: none;
  }

  .milestone-date-col {
    padding: 1.1rem 1.25rem 1.1rem 0;
    border-right: 1px solid var(--rule);
  }

  .milestone-date {
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    display: block;
    line-height: 1.4;
  }

  .milestone-date strong {
    display: block;
    font-size: 0.88rem;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0;
  }

  .milestone-body {
    padding: 1.1rem 0 1.1rem 1.25rem;
  }

  .milestone-label {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    margin-bottom: 0.2rem;
  }

  .milestone-label .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .milestone-phase {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .milestone-title {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 0.15rem;
  }

  .milestone-detail {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .milestone-tag {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    margin-top: 0.3rem;
    margin-right: 0.3rem;
    border: 1px solid;
  }

  .tag-buffer { border-color: var(--muted); color: var(--muted); }
  .tag-review { border-color: var(--accent); color: var(--accent); }
  .tag-deliverable { border-color: var(--phase-3); color: var(--phase-3); }
  .tag-kickoff { border-color: var(--phase-1); color: var(--phase-1); }

  .summary-bar {
    background: var(--warm);
    border: 1px solid var(--warm-rule);
    padding: 1rem 1.25rem;
    margin-top: 1.75rem;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .summary-stat .val {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--warm-text);
    line-height: 1;
  }

  .summary-stat .lbl {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-muted);
  }

  .btn-print {
    background: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 0.55rem 1.25rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.15s;
  }

  .btn-print:hover { background: var(--ink); color: var(--paper); }

  @media (max-width: 560px) {
    .field-row, .field-row.triple { grid-template-columns: 1fr; }
    .deliverable-grid { grid-template-columns: 1fr 1fr; }
    .phases-header, .phase-row { grid-template-columns: 2fr 1fr auto; }
    .milestone { grid-template-columns: 100px 1fr; }
  }

  @media print {
    body { background: white; padding: 0; }
    .form-section, .btn-generate, .btn-print, header { display: none; }
    #output { display: block !important; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Production <em>Timeline</em> Generator</h1>
    <p>Videos &amp; Digital Postcards</p>
  </header>

  <!-- PROJECT INFO -->
  <div class="form-section">
    <h2>Project Info</h2>
    <div class="field-row">
      <div>
        <label for="client">Client</label>
        <input type="text" id="client" placeholder="ABC Company">
      </div>
      <div>
        <label for="projectName">Project Name</label>
        <input type="text" id="projectName" placeholder="Open Enrollment 2026">
      </div>
    </div>
    <div class="field-row">
      <div>
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" onchange="updateLiveFeedback()">
      </div>
      <div>
        <label for="dueDate">Due Date</label>
        <input type="date" id="dueDate" onchange="updateLiveFeedback()">
      </div>
    </div>
    <div class="field-row">
      <div>
        <label for="workdays">Working Days / Week</label>
        <select id="workdays" onchange="updateLiveFeedback()">
          <option value="5" selected>5 days (Mon–Fri)</option>
          <option value="6">6 days (Mon–Sat)</option>
          <option value="7">7 days</option>
        </select>
      </div>
    </div>
    <div class="field-row single" style="margin-top:0.25rem;">
      <label style="display:block;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--warm-muted);margin-bottom:0.5rem;">Deliverable Types</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;">
        <div style="display:flex;flex-direction:column;gap:0.4rem;">
          <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
            <input type="checkbox" class="primary-deliverable" value="Video" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
            <span style="font-size:0.75rem;letter-spacing:0.04em;">Video</span>
          </label>
          <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
            <input type="checkbox" class="primary-deliverable" value="Presentation Video" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
            <span style="font-size:0.75rem;letter-spacing:0.04em;">Presentation Video</span>
          </label>
          <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
            <input type="checkbox" class="primary-deliverable" value="Digital Postcard" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
            <span style="font-size:0.75rem;letter-spacing:0.04em;">Digital Postcard</span>
          </label>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.4rem;border-left:1px solid var(--warm-rule);padding-left:1.5rem;">
          <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
            <input type="checkbox" id="includeLibrary" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
            <span style="font-size:0.75rem;letter-spacing:0.04em;">Library Videos</span>
          </label>
          <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
            <input type="checkbox" id="includeTranslation" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
            <span style="font-size:0.75rem;letter-spacing:0.04em;">Translation</span>
          </label>
        </div>
      </div>
    </div>
    <div class="field-row single" style="margin-top:0.75rem;">
      <div>
        <label for="projectType">Project Type</label>
        <select id="projectType" onchange="onProjectTypeChange()">
          <option value="">— select —</option>
          <option value="new">New</option>
          <option value="renewal">Renewal</option>
        </select>
      </div>
    </div>
  </div>


  <!-- PHASES -->
  <div class="form-section">
    <h2>Project Phases</h2>
    <div class="phases-header">
      <span>Phase Name</span>
      <span>Duration (days)</span>
      <span></span>
    </div>
    <div id="phaseList"></div>
    <button class="btn-add" onclick="addPhase()">+ Add Phase</button>
    <div id="liveFeedback" style="display:none;margin:0.75rem 0 0.5rem;padding:0.6rem 0.85rem;border-radius:4px;font-size:0.72rem;letter-spacing:0.04em;font-family:var(--font-mono);"></div>
    <button class="btn-generate" onclick="generate()">Generate Timeline →</button>
  </div>

  <!-- OUTPUT -->
  <div id="output">
    <div class="output-header">
      <h2 id="outTitle">—</h2>
      <div class="project-meta" id="outMeta"></div>
    </div>
    <div class="deliverables-note" id="outDeliverables"></div>

    <!-- EMAIL TABLE (default view) -->
    <div id="emailTable" style="margin-top:1.25rem;">
      <div style="border-bottom:2px solid var(--ink);padding-bottom:0.75rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:flex-end;">
        <span style="font-family:var(--font-serif);font-size:1.1rem;font-weight:300;">Timeline</span>
        <button class="btn-print" onclick="copyEmailText()" id="btnCopy">Copy to Clipboard</button>
      </div>
      <p style="font-size:0.7rem;color:var(--muted);letter-spacing:0.05em;margin-bottom:1rem;">Click any cell to edit before copying.</p>
      <table id="emailTableBody" style="width:100%;max-width:550px;border-collapse:collapse;font-family:Verdana,sans-serif;font-size:0.72rem;">
        <tbody id="emailRows"></tbody>
      </table>

      <!-- Hidden table used purely for clipboard copy — mirrors visible table exactly -->
      <table id="copyTarget" style="position:absolute;left:-9999px;top:-9999px;border-collapse:collapse;"></table>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap;">
      <button class="btn-print" onclick="toggleDetailedView()" id="btnDetailedView">Show Detailed Timeline</button>
      <button class="btn-print" onclick="window.print()">Print / Save as PDF</button>
    </div>

    <!-- DETAILED MILESTONE LIST (hidden by default) -->
    <div id="detailedView" style="display:none;margin-top:2rem;">
      <div style="border-bottom:2px solid var(--ink);padding-bottom:0.75rem;margin-bottom:0.25rem;">
        <span style="font-family:var(--font-serif);font-size:1.1rem;font-weight:300;">Detailed Timeline</span>
      </div>
      <ul class="timeline-list" id="milestoneList"></ul>
    </div>
  </div>

</div>

<script>
const PHASE_COLORS = ['--phase-1','--phase-2','--phase-3','--phase-4','--phase-5','--phase-6'];
let phaseCount = 0;

// Phase templates keyed by deliverable type, then project type (new/renewal)

      { name: 'Selection',          duration: 1, buffer: 0, deliverable: 'Library Videos' },

    ],
  },
  'Translation': {
    new: [
      { name: 'Translation',        duration: 2, buffer: 0, deliverable: 'Translation' },
      { name: 'Translation Updates', duration: 3, buffer: 0, deliverable: 'Translation' },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Translation' },
    ],
    renewal: [
      { name: 'Translation',        duration: 2, buffer: 0, deliverable: 'Translation' },
      { name: 'Translation Updates', duration: 3, buffer: 0, deliverable: 'Translation' },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Translation' },
    ],
  },
};

const DELIVERABLE_OPTIONS = ['Video','Presentation Video','Digital Postcard','Library Videos','Translation'];

// Phase ownership: who is responsible for each phase by name
const PHASE_OWNER = {
  'Storyboard Notes':   'Client',
  'Kickoff':            'Flimp',
  'Script':             'Client',
  'Style Slides':       'Flimp',
  'Review':             'Client',
  'Review Rd 1':        'Client',
  'Review Rd 2':        'Client',
  'Storyboards':        'Flimp',
  'Storyboard Edits':   'Flimp',
  'VO':                 'Flimp',
  'Animation':          'Flimp',
  'Animation Review':   'Flimp',
  'Approval':           'Client',
  'Content Collection': 'Client',
  'Design':             'Flimp',
  'Design Updates':     'Flimp',
  'Translation':        'Flimp',
  'Translation Updates': 'Flimp',
  'Selection':          'Client',
};

function onProjectTypeChange() { maybeLoadTemplate(); }

function maybeLoadTemplate() {
  const pType = document.getElementById('projectType').value;
  const selectedPrimary = [...document.querySelectorAll('.primary-deliverable:checked')].map(i => i.value);
  const withTranslation = document.getElementById('includeTranslation').checked;
  const withLibrary = document.getElementById('includeLibrary').checked;

  if (!pType || selectedPrimary.length === 0) return;

  clearPhases();

  const videoTypes = ['Video', 'Presentation Video'];
  const hasVideo = selectedPrimary.some(d => videoTypes.includes(d));
  const hasPostcard = selectedPrimary.includes('Digital Postcard');
  const isParallel = hasVideo && hasPostcard;

  selectedPrimary.forEach(dType => {
    const template = PHASE_TEMPLATES[dType]?.[pType];
    if (!template) return;
    const track = isParallel ? (videoTypes.includes(dType) ? 'video' : 'postcard') : 'main';
    template.forEach(p => addPhase({ ...p, track }));
  });

  if (withLibrary) {
    PHASE_TEMPLATES['Library Videos']['new'].forEach(p => addPhase({ ...p, track: 'addon' }));
  }
  if (withTranslation) {
    PHASE_TEMPLATES['Translation']['new'].forEach(p => addPhase({ ...p, track: 'addon' }));
  }
}

function clearPhases() {
  document.getElementById('phaseList').innerHTML = '';
  phaseCount = 0;
}

function buildDeliverableSelect(selected) {
  return `<select class="phase-deliverable">
    <option value="">— none —</option>
    ${DELIVERABLE_OPTIONS.map(o => `<option value="${o}"${o===selected?' selected':''}>${o}</option>`).join('')}
  </select>`;
}

function addPhase(data = {}) {
  const idx = phaseCount++;
  const color = `var(${PHASE_COLORS[idx % PHASE_COLORS.length]})`;
  const id = `phase-${idx}`;
  const track = data.track || 'main';

  const trackLabel = track === 'video' ? ' <span style="font-size:0.6rem;color:var(--phase-3);letter-spacing:0.06em;">VIDEO</span>'
                   : track === 'postcard' ? ' <span style="font-size:0.6rem;color:var(--phase-4);letter-spacing:0.06em;">POSTCARD</span>'
                   : track === 'addon' ? ' <span style="font-size:0.6rem;color:var(--muted);letter-spacing:0.06em;">ADD-ON</span>'
                   : '';

  const row = document.createElement('div');
  row.className = 'phase-row';
  row.id = id;
  row.innerHTML = `
    <input type="hidden" class="phase-track" value="${track}">
    <div class="phase-name-wrap">
      <span class="phase-color-dot" style="background:${color}"></span>
      <input type="text" class="phase-name" placeholder="Phase name" value="${data.name||''}">
      ${trackLabel}
    </div>
    <input type="hidden" class="phase-deliverable" value="${data.deliverable||''}">
    <input type="hidden" class="phase-buffer" value="${data.buffer??0}">
    <input type="number" class="phase-duration" min="1" value="${data.duration||3}" placeholder="days">
    <button class="btn-remove" onclick="removePhase('${id}')">✕</button>
  `;
  document.getElementById('phaseList').appendChild(row);
  updateLiveFeedback();
}

function removePhase(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  updateLiveFeedback();
}

function updateLiveFeedback() {
  const fb = document.getElementById('liveFeedback');
  const startVal = document.getElementById('startDate').value;
  const dueVal = document.getElementById('dueDate').value;
  const perWeek = parseInt(document.getElementById('workdays').value) || 5;

  if (!startVal || !dueVal) { fb.style.display = 'none'; return; }

  const start = new Date(startVal + 'T12:00:00');
  const due = new Date(dueVal + 'T12:00:00');
  if (due <= start) { fb.style.display = 'none'; return; }

  // Count available workdays between start and due
  let available = 0;
  const cursor = new Date(start);
  while (cursor < due) {
    cursor.setDate(cursor.getDate() + 1);
    const dow = cursor.getDay();
    if (perWeek === 7) available++;
    else if (perWeek === 6 && dow !== 0) available++;
    else if (perWeek === 5 && dow !== 0 && dow !== 6) available++;
  }

  // Sum phase durations from the longest parallel track
  const rows = [...document.querySelectorAll('.phase-row')];
  const byTrack = {};
  rows.forEach(row => {
    const track = row.querySelector('.phase-track').value || 'main';
    const dur = Math.max(1, parseInt(row.querySelector('.phase-duration').value) || 1);
    const buf = Math.max(0, parseInt(row.querySelector('.phase-buffer').value) || 0);
    byTrack[track] = (byTrack[track] || 0) + dur + buf;
  });

  // Parallel tracks (video + postcard) run simultaneously — longest wins
  const videoTotal = (byTrack['video'] || 0);
  const postcardTotal = (byTrack['postcard'] || 0);
  const mainTotal = (byTrack['main'] || 0);
  const addonTotal = (byTrack['addon'] || 0);
  const needed = Math.max(videoTotal, postcardTotal, mainTotal) + addonTotal;

  if (needed === 0) { fb.style.display = 'none'; return; }

  const diff = available - needed;
  fb.style.display = 'block';

  if (diff >= 0) {
    fb.style.background = 'rgba(103,231,78,0.12)';
    fb.style.color = 'var(--accent)';
    fb.style.border = '1px solid rgba(103,231,78,0.3)';
    fb.innerHTML = `✓ ${needed} days needed &nbsp;·&nbsp; ${available} available &nbsp;·&nbsp; <strong>${diff} day${diff !== 1 ? 's' : ''} to spare</strong>`;
  } else {
    fb.style.background = 'rgba(216,58,49,0.22)';
    fb.style.color = '#fff';
    fb.style.border = '1px solid rgba(216,58,49,0.6)';
    fb.innerHTML = `⚠ ${needed} days needed &nbsp;·&nbsp; ${available} available &nbsp;·&nbsp; <strong>${Math.abs(diff)} day${Math.abs(diff) !== 1 ? 's' : ''} over</strong>`;
  }
}

// Walk forwards by N workdays from a date
function addWorkdays(date, days, perWeek) {
  let d = new Date(date);
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (perWeek === 7) { added++; continue; }
    if (perWeek === 6 && dow !== 0) { added++; continue; }
    if (perWeek === 5 && dow !== 0 && dow !== 6) { added++; continue; }
  }
  return d;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtDateShort(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtDay(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function generate() {
  const name = document.getElementById('projectName').value.trim() || 'Untitled Project';
  const client = document.getElementById('client').value.trim();
  const startDateVal = document.getElementById('startDate').value;
  const dueDateVal = document.getElementById('dueDate').value;
  const perWeek = parseInt(document.getElementById('workdays').value);
  const projectType = document.getElementById('projectType').value;
  const selectedPrimary = [...document.querySelectorAll('.primary-deliverable:checked')].map(i => i.value);
  const withTranslation = document.getElementById('includeTranslation').checked;
  const withLibrary = document.getElementById('includeLibrary').checked;

  if (!startDateVal) { alert('Please set a start date.'); return; }
  if (!dueDateVal) { alert('Please set a due date.'); return; }
  if (selectedPrimary.length === 0) { alert('Please select at least one deliverable type.'); return; }

  const phases = [...document.querySelectorAll('.phase-row')].map(row => ({
    name: row.querySelector('.phase-name').value.trim() || 'Unnamed Phase',
    deliverable: row.querySelector('.phase-deliverable').value,
    duration: Math.max(1, parseInt(row.querySelector('.phase-duration').value)||1),
    buffer: Math.max(0, parseInt(row.querySelector('.phase-buffer').value)||0),
    track: row.querySelector('.phase-track').value,
  }));

  if (!phases.length) { alert('Add at least one phase.'); return; }

  const projectStart = new Date(startDateVal + 'T12:00:00');
  const dueDate = new Date(dueDateVal + 'T12:00:00');

  // Separate phases by track
  const videoPhases    = phases.filter(p => p.track === 'video');
  const postcardPhases = phases.filter(p => p.track === 'postcard');
  const mainPhases     = phases.filter(p => p.track === 'main');
  const addonPhases    = phases.filter(p => p.track === 'addon');

  const isParallel = videoPhases.length > 0 && postcardPhases.length > 0;

  // Helper: schedule a list of phases forward from a cursor date
  function scheduleForwards(phaseList, fromDate) {
    let cursor = new Date(fromDate);
    const sched = [];
    phaseList.forEach(ph => {
      const phaseStart = new Date(cursor);
      const phaseEnd = addWorkdays(cursor, ph.duration, perWeek);
      let bufferEnd = null;
      if (ph.buffer > 0) {
        bufferEnd = addWorkdays(phaseEnd, ph.buffer, perWeek);
        cursor = new Date(bufferEnd);
      } else {
        cursor = new Date(phaseEnd);
      }
      sched.push({ ph, phaseStart, phaseEnd, bufferEnd });
    });
    return { schedule: sched, trackEnd: new Date(cursor) };
  }

  let videoSchedule = [], postcardSchedule = [], mainSchedule = [], addonSchedule = [];
  let videoTrackEnd, postcardTrackEnd;

  if (isParallel) {
    // Both primary tracks start on projectStart and run in parallel
    const videoResult = scheduleForwards(videoPhases, projectStart);
    videoSchedule = videoResult.schedule;
    videoTrackEnd = videoResult.trackEnd;

    const postcardResult = scheduleForwards(postcardPhases, projectStart);
    postcardSchedule = postcardResult.schedule;
    postcardTrackEnd = postcardResult.trackEnd;

    // Addons chain off the end of the video track
    if (addonPhases.length > 0) {
      const addonResult = scheduleForwards(addonPhases, videoTrackEnd);
      addonSchedule = addonResult.schedule;
    }
  } else {
    // Single sequential track
    const allSequential = [...mainPhases, ...videoPhases, ...postcardPhases, ...addonPhases];
    const result = scheduleForwards(allSequential, projectStart);
    mainSchedule = result.schedule;
  }

  // --- Build milestone list, sorted by date ---
  const milestones = [];

  function pushPhaseMilestones(sched, colorOffset = 0) {
    sched.forEach(({ ph, phaseStart, phaseEnd, bufferEnd }, i) => {
      const colorIdx = (i + colorOffset) % PHASE_COLORS.length;
      milestones.push({
        type: 'phase-start',
        date: new Date(phaseStart),
        phase: ph.name,
        track: ph.track,
        title: `${ph.name} begins`,
        detail: `${ph.duration} working day${ph.duration !== 1 ? 's' : ''}`,
        tags: [],
        colorIdx,
      });
      if (ph.deliverable) {
        milestones.push({
          type: 'deliverable',
          date: new Date(phaseEnd),
          phase: ph.name,
          track: ph.track,
          title: ph.deliverable,
          detail: `Deliverable due — end of ${ph.name}`,
          tags: ['deliverable'],
          colorIdx,
        });
      } else {
        milestones.push({
          type: 'phase-end',
          date: new Date(phaseEnd),
          phase: ph.name,
          track: ph.track,
          title: `${ph.name} complete`,
          detail: `Phase closes`,
          tags: [],
          colorIdx,
        });
      }
      if (bufferEnd) {
        milestones.push({
          type: 'buffer',
          date: new Date(bufferEnd),
          phase: ph.name,
          track: ph.track,
          title: 'Review & Revision Window',
          detail: `${ph.buffer} day${ph.buffer !== 1 ? 's' : ''} buffer · feedback / amends`,
          tags: ['review'],
          colorIdx,
        });
      }
    });
  }

  milestones.push({
    type: 'kickoff',
    date: new Date(projectStart),
    phase: '', track: '',
    title: 'Project Kickoff',
    detail: `${name}${client ? ' · ' + client : ''}`,
    tags: ['kickoff'],
    colorIdx: -1,
  });

  if (isParallel) {
    pushPhaseMilestones(videoSchedule, 0);
    pushPhaseMilestones(postcardSchedule, 2);
    pushPhaseMilestones(addonSchedule, 4);
  } else {
    pushPhaseMilestones(mainSchedule, 0);
  }

  milestones.push({
    type: 'wrap',
    date: new Date(dueDate),
    phase: '', track: '',
    title: 'Due Date',
    detail: 'All deliverables complete',
    tags: ['deliverable'],
    colorIdx: -1,
  });

  // Sort by date, kickoff always first, wrap always last
  milestones.sort((a, b) => {
    if (a.type === 'kickoff') return -1;
    if (b.type === 'kickoff') return 1;
    if (a.type === 'wrap') return 1;
    if (b.type === 'wrap') return -1;
    return a.date - b.date;
  });

  // Totals
  const allSched = [...videoSchedule, ...postcardSchedule, ...mainSchedule, ...addonSchedule];
  const totalDays = allSched.reduce((s, { ph }) => s + ph.duration, 0);
  const totalBuffer = allSched.reduce((s, { ph }) => s + ph.buffer, 0);

  // Latest end date across all tracks
  const allEnds = allSched.map(({ bufferEnd, phaseEnd }) => bufferEnd || phaseEnd);
  const projectedEnd = allEnds.length ? new Date(Math.max(...allEnds.map(d => d.getTime()))) : new Date(dueDate);
  const dueDateClean = new Date(dueDate); dueDateClean.setHours(0,0,0,0);

  // --- Render ---
  const ptLabel = projectType ? projectType.charAt(0).toUpperCase()+projectType.slice(1) : '';
  const deliverableLabel = [...selectedPrimary, withLibrary ? 'Library Videos' : '', withTranslation ? 'Translation' : ''].filter(Boolean).join(' + ');
  document.getElementById('outTitle').textContent = name;
  document.getElementById('outMeta').innerHTML =
    `${client ? client + '<br>' : ''}${deliverableLabel ? deliverableLabel + ' · ' : ''}${ptLabel}<br>${startDateVal ? 'Start: ' + fmtDate(new Date(startDateVal+'T12:00:00')) + '<br>' : ''}Due: ${fmtDate(dueDate)}<br>${perWeek}‑day work week`;

  document.getElementById('outDeliverables').textContent =
    deliverableLabel
      ? `${ptLabel ? ptLabel + ' · ' : ''}${deliverableLabel} · Project start: ${fmtDate(projectStart)}`
      : `Project start: ${fmtDate(projectStart)}`;

  const list = document.getElementById('milestoneList');
  list.innerHTML = '';

  milestones.forEach(m => {
    const color = m.colorIdx >= 0
      ? `var(${PHASE_COLORS[m.colorIdx]})`
      : (m.type === 'wrap' ? 'var(--ink)' : 'var(--muted)');
    const li = document.createElement('li');
    li.className = 'milestone';
    if (m.type === 'wrap') li.style.background = 'var(--accent-light)';

    // Flag milestones past due date
    const mDate = new Date(m.date); mDate.setHours(0,0,0,0);
    const isPastDue = mDate > dueDateClean && m.type !== 'kickoff' && m.type !== 'wrap';

    const tagHtml = m.tags.map(t => `<span class="milestone-tag tag-${t}">${t}</span>`).join('');
    const trackBadge = m.track === 'video' ? `<span class="milestone-tag" style="border-color:var(--phase-3);color:var(--phase-3);">video</span>`
                     : m.track === 'postcard' ? `<span class="milestone-tag" style="border-color:var(--phase-4);color:var(--phase-4);">postcard</span>`
                     : '';
    li.innerHTML = `
      <div class="milestone-date-col">
        <span class="milestone-date">
          <strong>${fmtDateShort(m.date)}</strong>
          ${fmtDay(m.date)}
        </span>
      </div>
      <div class="milestone-body">
        <div class="milestone-label">
          <span class="dot" style="background:${color}"></span>
          ${m.phase ? `<span class="milestone-phase">${m.phase}</span>` : ''}
        </div>
        <div class="milestone-title">${m.title}</div>
        <div class="milestone-detail">${m.detail}</div>
        ${trackBadge}${tagHtml}
      </div>
    `;
    list.appendChild(li);
  });

  // --- Build email table rows ---
  // One row per phase-start milestone (represents the task and its due date)
  // Use phaseEnd date as the date shown (when it's due), owner from PHASE_OWNER map
  const emailRows = document.getElementById('emailRows');
  emailRows.innerHTML = '';

  // Title row
  const titleRow = document.createElement('tr');
  titleRow.innerHTML = `
    <td colspan="4" contenteditable="true" style="padding:0.5rem 0.75rem 0.5rem 0;font-family:Verdana,sans-serif;font-size:0.85rem;font-weight:600;border-bottom:1px solid #ccc;">${name}${client ? ' — ' + client : ''}</td>
  `;
  emailRows.appendChild(titleRow);

  // Column headers — sit under the project title
  const colHeaderRow = document.createElement('tr');
  colHeaderRow.innerHTML = `
    <th style="text-align:left;padding:0.35rem 0.75rem 0.35rem 0;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:2px solid #000;width:18%;font-family:Verdana,sans-serif;">Party</th>
    <th style="text-align:left;padding:0.35rem 0.75rem;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:2px solid #000;width:12%;font-family:Verdana,sans-serif;">Deliverable</th>
    <th style="text-align:left;padding:0.35rem 0.75rem;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:2px solid #000;width:40%;font-family:Verdana,sans-serif;">Task</th>
    <th style="text-align:left;padding:0.35rem 0 0.35rem 0.5rem;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:2px solid #000;width:10%;font-family:Verdana,sans-serif;">Due Date</th>
  `;
  emailRows.appendChild(colHeaderRow);

  // One row per phase, using the sorted milestone list (phase-start entries only, plus wrap)
  const emailMilestones = milestones.filter(m => m.type === 'phase-start' || m.type === 'wrap');

  const trackLabels = {
    video: 'Video',
    postcard: 'DP',
    main: '',
  };

  emailMilestones.forEach((m, i) => {
    const isWrap = m.type === 'wrap';
    const clientLabel = client || 'Client';
    const owner = isWrap ? 'Flimp' : (PHASE_OWNER[m.phase] === 'Client' ? clientLabel : 'Flimp');
    const taskLabel = isWrap ? 'Final deliverables complete' : m.phase;
    // For addons, use the phase's own deliverable name (Translation / Library Videos)
    let deliverableLabel = '';
    if (!isWrap) {
      if (m.track === 'addon') {
        // Find the phase object to get its deliverable field
        const ph = phases.find(p => p.name === m.phase);
        deliverableLabel = ph?.deliverable || m.phase;
      } else {
        deliverableLabel = trackLabels[m.track] || '';
      }
    }
    let displayDate = m.date;
    if (!isWrap) {
      const nextClose = milestones.find(x =>
        (x.type === 'phase-end' || x.type === 'deliverable' || x.type === 'buffer') &&
        x.phase === m.phase && x.date >= m.date
      );
      if (nextClose) displayDate = nextClose.date;
    }

    const displayDateClean = new Date(displayDate); displayDateClean.setHours(0,0,0,0);
    const isPastDue = displayDateClean > dueDateClean;
    const dateStyle = isPastDue
      ? 'padding:0.3rem 0 0.3rem 0.5rem;border-bottom:1px solid #ccc;font-size:0.72rem;font-family:Verdana,sans-serif;white-space:nowrap;color:#cc0000;font-weight:bold;'
      : 'padding:0.3rem 0 0.3rem 0.5rem;border-bottom:1px solid #ccc;font-size:0.72rem;font-family:Verdana,sans-serif;white-space:nowrap;';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td contenteditable="true" style="padding:0.3rem 0.75rem 0.3rem 0;border-bottom:1px solid #ccc;font-size:0.72rem;font-family:Verdana,sans-serif;">${owner}</td>
      <td contenteditable="true" style="padding:0.3rem 0.75rem;border-bottom:1px solid #ccc;font-size:0.68rem;font-family:Verdana,sans-serif;">${deliverableLabel}</td>
      <td contenteditable="true" style="padding:0.3rem 0.75rem;border-bottom:1px solid #ccc;font-size:0.72rem;font-family:Verdana,sans-serif;max-width:180px;">${taskLabel}</td>
      <td contenteditable="true" style="${dateStyle}">${fmtDateShort(displayDate)}</td>
    `;
    emailRows.appendChild(tr);
  });

  // Summary row inside the table so it's included in selection copy
  const totalCalDays = Math.round((projectedEnd - projectStart) / (1000*60*60*24));
  const summaryTr = document.createElement('tr');
  summaryTr.innerHTML = `
    <td colspan="4" style="padding:0.6rem 0.75rem 0.4rem 0;border-top:2px solid #000;font-size:0.68rem;letter-spacing:0.04em;font-family:Verdana,sans-serif;font-weight:bold;">
      Project Start: ${fmtDateShort(projectStart)}&nbsp;&nbsp;·&nbsp;&nbsp;Working Days: ${totalDays}&nbsp;&nbsp;·&nbsp;&nbsp;Due Date: ${fmtDateShort(dueDate)}
    </td>
  `;
  emailRows.appendChild(summaryTr);
  document.getElementById('detailedView').style.display = 'none';
  document.getElementById('btnDetailedView').textContent = 'Show Detailed Timeline';

  const out = document.getElementById('output');
  out.classList.add('visible');
  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleDetailedView() {
  const el = document.getElementById('detailedView');
  const btn = document.getElementById('btnDetailedView');
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? 'block' : 'none';
  btn.textContent = hidden ? 'Hide Detailed Timeline' : 'Show Detailed Timeline';
  if (hidden) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyEmailText() {
  const btn = document.getElementById('btnCopy');

  // Select the visible email table so the user can Cmd/Ctrl+C
  const table = document.getElementById('emailTableBody');
  const range = document.createRange();
  range.selectNode(table);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  // Try execCommand first (works in most browsers when content is selected)
  const success = document.execCommand('copy');
  if (success) {
    sel.removeAllRanges();
    btn.textContent = '✓ Copied — paste into email';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 3000);
  } else {
    // Selection is still active — tell user to copy manually
    btn.textContent = 'Table selected — press Cmd+C / Ctrl+C';
    setTimeout(() => {
      sel.removeAllRanges();
      btn.textContent = 'Copy to Clipboard';
    }, 4000);
  }
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('startDate').value = `${yyyy}-${mm}-${dd}`;
  document.getElementById('phaseList').addEventListener('input', e => {
    if (e.target.classList.contains('phase-duration') || e.target.classList.contains('phase-buffer')) {
      updateLiveFeedback();
    }
  });
});
