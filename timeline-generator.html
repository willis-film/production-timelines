<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Timeline Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1714;
    --paper: #f5f0e8;
    --warm: #e8dfc8;
    --accent: #c4522a;
    --accent-light: #f0ded5;
    --rule: #c8bfaa;
    --muted: #8a7f70;
    --phase-1: #4a6741;
    --phase-2: #c4522a;
    --font-mono: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', 'Courier New', monospace;
    --font-serif: 'Georgia', 'Times New Roman', serif;
    --phase-3: #2a5a7c;
    --phase-4: #7c4a2a;
    --phase-5: #5a4a7c;
    --phase-6: #7c6a2a;
  }

  body {
    font-family: var(--font-mono);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1.25rem;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: var(--font-serif);
    font-size: 2.4rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  header p {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── FORM ── */
  .form-section {
    background: var(--warm);
    border: 1px solid var(--rule);
    padding: 1.75rem;
    margin-bottom: 2rem;
  }

  .form-section h2 {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    color: var(--muted);
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .field-row.single { grid-template-columns: 1fr; }
  .field-row.triple { grid-template-columns: 1fr 1fr 1fr; }

  label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  select {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 0;
    padding: 0.5rem 0.65rem;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  /* ── PHASES TABLE ── */
  .phases-header {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr 1fr auto;
    gap: 0.5rem;
    padding: 0 0 0.4rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0.5rem;
  }

  .phases-header span {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .phase-row {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr 1fr auto;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.45rem;
  }

  .phase-color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.4rem;
    flex-shrink: 0;
  }

  .phase-name-wrap {
    display: flex;
    align-items: center;
  }

  .phase-name-wrap input {
    flex: 1;
  }

  .btn-remove {
    background: none;
    border: 1px solid var(--rule);
    color: var(--muted);
    cursor: pointer;
    padding: 0.4rem 0.55rem;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    transition: all 0.15s;
    line-height: 1;
  }

  .btn-remove:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-add {
    background: none;
    border: 1px dashed var(--rule);
    color: var(--muted);
    cursor: pointer;
    padding: 0.55rem 1rem;
    font-size: 0.72rem;
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: 100%;
    margin-top: 0.5rem;
    transition: all 0.15s;
  }

  .btn-add:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  .btn-generate {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.85rem 2rem;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    margin-top: 1.5rem;
    transition: background 0.15s;
  }

  .btn-generate:hover {
    background: var(--accent);
  }

  /* ── DELIVERABLE CHECKBOXES ── */
  .deliverable-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
  }

  .deliverable-check {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    padding: 0.4rem 0.5rem;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .deliverable-check:hover {
    border-color: var(--rule);
    background: var(--paper);
  }

  .deliverable-check input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .deliverable-check span {
    font-size: 0.72rem;
  }

  /* ── OUTPUT ── */
  #output {
    display: none;
  }

  #output.visible {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 0.75rem;
    margin-bottom: 0.25rem;
  }

  .output-header h2 {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 300;
  }

  .output-header .project-meta {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.06em;
  }

  .deliverables-note {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    padding: 0.4rem 0 1.25rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
  }

  .timeline-list {
    list-style: none;
  }

  .milestone {
    display: grid;
    grid-template-columns: 130px 1fr;
    border-bottom: 1px solid var(--rule);
    padding: 0;
    position: relative;
  }

  .milestone:last-child {
    border-bottom: none;
  }

  .milestone-date-col {
    padding: 1.1rem 1.25rem 1.1rem 0;
    border-right: 1px solid var(--rule);
  }

  .milestone-date {
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    display: block;
    line-height: 1.4;
  }

  .milestone-date strong {
    display: block;
    font-size: 0.88rem;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0;
  }

  .milestone-body {
    padding: 1.1rem 0 1.1rem 1.25rem;
  }

  .milestone-label {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    margin-bottom: 0.2rem;
  }

  .milestone-label .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .milestone-phase {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .milestone-title {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 0.15rem;
  }

  .milestone-detail {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .milestone-tag {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    margin-top: 0.3rem;
    margin-right: 0.3rem;
    border: 1px solid;
  }

  .tag-buffer { border-color: var(--muted); color: var(--muted); }
  .tag-review { border-color: var(--accent); color: var(--accent); }
  .tag-deliverable { border-color: var(--phase-3); color: var(--phase-3); }
  .tag-kickoff { border-color: var(--phase-1); color: var(--phase-1); }

  .summary-bar {
    background: var(--warm);
    border: 1px solid var(--rule);
    padding: 1rem 1.25rem;
    margin-top: 1.75rem;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .summary-stat .val {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1;
  }

  .summary-stat .lbl {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .btn-print {
    background: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 0.55rem 1.25rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.15s;
  }

  .btn-print:hover { background: var(--ink); color: var(--paper); }

  @media (max-width: 560px) {
    .field-row, .field-row.triple { grid-template-columns: 1fr; }
    .deliverable-grid { grid-template-columns: 1fr 1fr; }
    .phases-header, .phase-row { grid-template-columns: 1.5fr 1fr 0.8fr 0.8fr auto; }
    .milestone { grid-template-columns: 100px 1fr; }
  }

  @media print {
    body { background: white; padding: 0; }
    .form-section, .btn-generate, .btn-print { display: none; }
    #output { display: block !important; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Production <em>Timeline</em></h1>
    <p>Animation &amp; Video · Schedule Generator</p>
  </header>

  <!-- PROJECT INFO -->
  <div class="form-section">
    <h2>Project Info</h2>
    <div class="field-row">
      <div>
        <label for="projectName">Project Name</label>
        <input type="text" id="projectName" placeholder="e.g. Brand Explainer V2">
      </div>
      <div>
        <label for="client">Client / Studio</label>
        <input type="text" id="client" placeholder="e.g. Acme Co.">
      </div>
    </div>
    <div class="field-row single">
      <div>
        <label for="projectType">Project Type</label>
        <select id="projectType" onchange="onProjectTypeChange()">
          <option value="">— select —</option>
          <option value="new">New</option>
          <option value="renewal">Renewal</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div>
        <label for="startDate">Due Date</label>
        <input type="date" id="startDate">
      </div>
      <div>
        <label for="workdays">Working Days / Week</label>
        <select id="workdays">
          <option value="5" selected>5 days (Mon–Fri)</option>
          <option value="6">6 days (Mon–Sat)</option>
          <option value="7">7 days</option>
        </select>
      </div>
    </div>
    <div class="field-row single" style="margin-top:0.25rem;">
      <label style="display:block;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;">Deliverable Types</label>
      <div style="display:flex;flex-wrap:wrap;gap:0.4rem 1.5rem;">
        <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
          <input type="checkbox" class="primary-deliverable" value="Video" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:0.75rem;letter-spacing:0.04em;">Video</span>
        </label>
        <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
          <input type="checkbox" class="primary-deliverable" value="Presentation Video" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:0.75rem;letter-spacing:0.04em;">Presentation Video</span>
        </label>
        <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
          <input type="checkbox" class="primary-deliverable" value="Digital Postcard" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:0.75rem;letter-spacing:0.04em;">Digital Postcard</span>
        </label>
        <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;border-left:1px solid var(--rule);padding-left:1.5rem;">
          <input type="checkbox" id="includeLibrary" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:0.75rem;letter-spacing:0.04em;">Library Videos</span>
        </label>
        <label class="deliverable-check" style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;">
          <input type="checkbox" id="includeTranslation" onchange="onProjectTypeChange()" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:0.75rem;letter-spacing:0.04em;">Translation</span>
        </label>
      </div>
    </div>
  </div>


  <!-- PHASES -->
  <div class="form-section">
    <h2>Project Phases</h2>
    <div class="phases-header">
      <span>Phase Name</span>
      <span>Deliverable</span>
      <span>Duration (days)</span>
      <span>Buffer (days)</span>
      <span></span>
    </div>
    <div id="phaseList"></div>
    <button class="btn-add" onclick="addPhase()">+ Add Phase</button>
    <button class="btn-generate" onclick="generate()">Generate Timeline →</button>
  </div>

  <!-- OUTPUT -->
  <div id="output">
    <div class="output-header">
      <h2 id="outTitle">—</h2>
      <div class="project-meta" id="outMeta"></div>
    </div>
    <div class="deliverables-note" id="outDeliverables"></div>
    <ul class="timeline-list" id="milestoneList"></ul>
    <div class="summary-bar" id="summaryBar"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap;">
      <button class="btn-print" onclick="window.print()">Print / Save as PDF</button>
      <button class="btn-print" onclick="toggleEmailTable()" id="btnEmailTable">Show Email Version</button>
    </div>

    <!-- EMAIL TABLE -->
    <div id="emailTable" style="display:none;margin-top:2rem;">
      <div style="border-bottom:2px solid var(--ink);padding-bottom:0.75rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:flex-end;">
        <span style="font-family:var(--font-serif);font-size:1.1rem;font-weight:300;">Email Version</span>
        <button class="btn-print" onclick="copyEmailText()" id="btnCopy">Copy to Clipboard</button>
      </div>
      <p style="font-size:0.7rem;color:var(--muted);letter-spacing:0.05em;margin-bottom:1rem;">Paste directly into an email. Click any cell to edit before copying.</p>
      <table id="emailTableBody" style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:0.8rem;">
        <thead>
          <tr style="border-bottom:2px solid var(--ink);">
            <th style="text-align:left;padding:0.5rem 0.75rem 0.5rem 0;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);width:18%;">Party</th>
            <th style="text-align:left;padding:0.5rem 0.75rem;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);">Task</th>
            <th style="text-align:left;padding:0.5rem 0 0.5rem 0.75rem;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);width:14%;">Date</th>
          </tr>
        </thead>
        <tbody id="emailRows"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const PHASE_COLORS = ['--phase-1','--phase-2','--phase-3','--phase-4','--phase-5','--phase-6'];
let phaseCount = 0;

// Phase templates keyed by deliverable type, then project type (new/renewal)
// duration = working days; buffer = review buffer days after phase
const PHASE_TEMPLATES = {
  'Video': {
    new: [
      { name: 'Kickoff',            duration: 1, buffer: 0 },
      { name: 'Script',             duration: 3, buffer: 2 },
      { name: 'Style Slides',       duration: 2, buffer: 2 },
      { name: 'Review',             duration: 2, buffer: 0 },
      { name: 'Storyboards',        duration: 5, buffer: 0 },
      { name: 'Review Rd 1',        duration: 2, buffer: 0 },
      { name: 'Storyboard Edits',   duration: 3, buffer: 0 },
      { name: 'Review Rd 2',        duration: 2, buffer: 0 },
      { name: 'VO',                 duration: 2, buffer: 1 },
      { name: 'Animation',          duration: 7, buffer: 0 },
      { name: 'Animation Review',   duration: 2, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Video' },
    ],
    renewal: [
      { name: 'Storyboards',        duration: 5, buffer: 0 },
      { name: 'Review Rd 1',        duration: 2, buffer: 0 },
      { name: 'Storyboard Edits',   duration: 3, buffer: 0 },
      { name: 'Review Rd 2',        duration: 2, buffer: 0 },
      { name: 'VO',                 duration: 2, buffer: 1 },
      { name: 'Animation',          duration: 7, buffer: 0 },
      { name: 'Animation Review',   duration: 2, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Video' },
    ],
  },
  'Presentation Video': {
    new: [
      { name: 'Kickoff',            duration: 1, buffer: 0 },
      { name: 'Script',             duration: 3, buffer: 2 },
      { name: 'Style Slides',       duration: 2, buffer: 2 },
      { name: 'Review',             duration: 2, buffer: 0 },
      { name: 'Storyboards',        duration: 5, buffer: 0 },
      { name: 'Review Rd 1',        duration: 2, buffer: 0 },
      { name: 'Storyboard Edits',   duration: 3, buffer: 0 },
      { name: 'Review Rd 2',        duration: 2, buffer: 0 },
      { name: 'VO',                 duration: 2, buffer: 1 },
      { name: 'Animation',          duration: 7, buffer: 0 },
      { name: 'Animation Review',   duration: 2, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Presentation Video' },
    ],
    renewal: [
      { name: 'Storyboards',        duration: 5, buffer: 0 },
      { name: 'Review Rd 1',        duration: 2, buffer: 0 },
      { name: 'Storyboard Edits',   duration: 3, buffer: 0 },
      { name: 'Review Rd 2',        duration: 2, buffer: 0 },
      { name: 'VO',                 duration: 2, buffer: 1 },
      { name: 'Animation',          duration: 7, buffer: 0 },
      { name: 'Animation Review',   duration: 2, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Presentation Video' },
    ],
  },
  'Digital Postcard': {
    new: [
      { name: 'Content Collection', duration: 3, buffer: 1 },
      { name: 'Design',             duration: 4, buffer: 0 },
      { name: 'Review',             duration: 2, buffer: 0 },
      { name: 'Design Updates',     duration: 2, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Digital Postcard' },
    ],
    renewal: [
      { name: 'Content Collection', duration: 3, buffer: 1 },
      { name: 'Design',             duration: 4, buffer: 0 },
      { name: 'Review',             duration: 2, buffer: 0 },
      { name: 'Design Updates',     duration: 2, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Digital Postcard' },
    ],
  },
  'Library Videos': {
    new: [
      { name: 'Selection',          duration: 1, buffer: 0, deliverable: 'Library Videos' },
    ],
    renewal: [
      { name: 'Selection',          duration: 1, buffer: 0, deliverable: 'Library Videos' },
    ],
  },
  'Translation': {
    new: [
      { name: 'Translation',        duration: 5, buffer: 1 },
      { name: 'Updates',            duration: 3, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Translation' },
    ],
    renewal: [
      { name: 'Translation',        duration: 5, buffer: 1 },
      { name: 'Updates',            duration: 3, buffer: 0 },
      { name: 'Approval',           duration: 1, buffer: 0, deliverable: 'Translation' },
    ],
  },
};

const DELIVERABLE_OPTIONS = ['Video','Presentation Video','Digital Postcard','Library Videos','Translation'];

// Phase ownership: who is responsible for each phase by name
const PHASE_OWNER = {
  'Kickoff':            'Flimp',
  'Script':             'Client',
  'Style Slides':       'Flimp',
  'Review':             'Client',
  'Review Rd 1':        'Client',
  'Review Rd 2':        'Client',
  'Storyboards':        'Flimp',
  'Storyboard Edits':   'Flimp',
  'VO':                 'Flimp',
  'Animation':          'Flimp',
  'Animation Review':   'Flimp',
  'Approval':           'Client',
  'Content Collection': 'Client',
  'Design':             'Flimp',
  'Design Updates':     'Flimp',
  'Translation':        'Flimp',
  'Updates':            'Flimp',
  'Selection':          'Client',
};

function onProjectTypeChange() { maybeLoadTemplate(); }

function maybeLoadTemplate() {
  const pType = document.getElementById('projectType').value;
  const selectedPrimary = [...document.querySelectorAll('.primary-deliverable:checked')].map(i => i.value);
  const withTranslation = document.getElementById('includeTranslation').checked;
  const withLibrary = document.getElementById('includeLibrary').checked;

  if (!pType || selectedPrimary.length === 0) return;

  clearPhases();

  const videoTypes = ['Video', 'Presentation Video'];
  const hasVideo = selectedPrimary.some(d => videoTypes.includes(d));
  const hasPostcard = selectedPrimary.includes('Digital Postcard');
  const isParallel = hasVideo && hasPostcard;

  selectedPrimary.forEach(dType => {
    const template = PHASE_TEMPLATES[dType]?.[pType];
    if (!template) return;
    const track = isParallel ? (videoTypes.includes(dType) ? 'video' : 'postcard') : 'main';
    template.forEach(p => addPhase({ ...p, track }));
  });

  if (withLibrary) {
    PHASE_TEMPLATES['Library Videos']['new'].forEach(p => addPhase({ ...p, track: 'addon' }));
  }
  if (withTranslation) {
    PHASE_TEMPLATES['Translation']['new'].forEach(p => addPhase({ ...p, track: 'addon' }));
  }
}

function clearPhases() {
  document.getElementById('phaseList').innerHTML = '';
  phaseCount = 0;
}

function buildDeliverableSelect(selected) {
  return `<select class="phase-deliverable">
    <option value="">— none —</option>
    ${DELIVERABLE_OPTIONS.map(o => `<option value="${o}"${o===selected?' selected':''}>${o}</option>`).join('')}
  </select>`;
}

function addPhase(data = {}) {
  const idx = phaseCount++;
  const color = `var(${PHASE_COLORS[idx % PHASE_COLORS.length]})`;
  const id = `phase-${idx}`;
  const track = data.track || 'main';

  const trackLabel = track === 'video' ? ' <span style="font-size:0.6rem;color:var(--phase-3);letter-spacing:0.06em;">VIDEO</span>'
                   : track === 'postcard' ? ' <span style="font-size:0.6rem;color:var(--phase-4);letter-spacing:0.06em;">POSTCARD</span>'
                   : track === 'addon' ? ' <span style="font-size:0.6rem;color:var(--muted);letter-spacing:0.06em;">ADD-ON</span>'
                   : '';

  const row = document.createElement('div');
  row.className = 'phase-row';
  row.id = id;
  row.innerHTML = `
    <input type="hidden" class="phase-track" value="${track}">
    <div class="phase-name-wrap">
      <span class="phase-color-dot" style="background:${color}"></span>
      <input type="text" class="phase-name" placeholder="Phase name" value="${data.name||''}">
      ${trackLabel}
    </div>
    ${buildDeliverableSelect(data.deliverable||'')}
    <input type="number" class="phase-duration" min="1" value="${data.duration||3}" placeholder="days">
    <input type="number" class="phase-buffer" min="0" value="${data.buffer??0}" placeholder="days">
    <button class="btn-remove" onclick="removePhase('${id}')">✕</button>
  `;
  document.getElementById('phaseList').appendChild(row);
}

function removePhase(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// Walk backwards by N workdays from a date
function subtractWorkdays(date, days, perWeek) {
  let d = new Date(date);
  let subtracted = 0;
  while (subtracted < days) {
    d.setDate(d.getDate() - 1);
    const dow = d.getDay();
    if (perWeek === 7) { subtracted++; continue; }
    if (perWeek === 6 && dow !== 0) { subtracted++; continue; }
    if (perWeek === 5 && dow !== 0 && dow !== 6) { subtracted++; continue; }
  }
  return d;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtDateShort(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtDay(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function generate() {
  const name = document.getElementById('projectName').value.trim() || 'Untitled Project';
  const client = document.getElementById('client').value.trim();
  const dueDateVal = document.getElementById('startDate').value;
  const perWeek = parseInt(document.getElementById('workdays').value);
  const projectType = document.getElementById('projectType').value;
  const selectedPrimary = [...document.querySelectorAll('.primary-deliverable:checked')].map(i => i.value);
  const withTranslation = document.getElementById('includeTranslation').checked;
  const withLibrary = document.getElementById('includeLibrary').checked;

  if (!dueDateVal) { alert('Please set a due date.'); return; }
  if (selectedPrimary.length === 0) { alert('Please select at least one deliverable type.'); return; }

  const phases = [...document.querySelectorAll('.phase-row')].map(row => ({
    name: row.querySelector('.phase-name').value.trim() || 'Unnamed Phase',
    deliverable: row.querySelector('.phase-deliverable').value,
    duration: Math.max(1, parseInt(row.querySelector('.phase-duration').value)||1),
    buffer: Math.max(0, parseInt(row.querySelector('.phase-buffer').value)||0),
    track: row.querySelector('.phase-track').value,
  }));

  if (!phases.length) { alert('Add at least one phase.'); return; }

  const dueDate = new Date(dueDateVal + 'T12:00:00');

  // Separate phases by track
  const videoPhases   = phases.filter(p => p.track === 'video');
  const postcardPhases = phases.filter(p => p.track === 'postcard');
  const mainPhases    = phases.filter(p => p.track === 'main');
  const addonPhases   = phases.filter(p => p.track === 'addon');

  const isParallel = videoPhases.length > 0 && postcardPhases.length > 0;

  // Helper: schedule a list of phases backwards from a cursor date
  // Returns { schedule, projectStart } where schedule = [{ph, phaseStart, phaseEnd, bufferEnd}]
  function scheduleBackwards(phaseList, fromDate) {
    let cursor = new Date(fromDate);
    const sched = [];
    for (let i = phaseList.length - 1; i >= 0; i--) {
      const ph = phaseList[i];
      let bufferEnd = null;
      if (ph.buffer > 0) {
        bufferEnd = new Date(cursor);
        cursor = subtractWorkdays(cursor, ph.buffer, perWeek);
      }
      const phaseEnd = new Date(cursor);
      const phaseStart = subtractWorkdays(cursor, ph.duration, perWeek);
      sched.unshift({ ph, phaseStart, phaseEnd, bufferEnd });
      cursor = new Date(phaseStart);
    }
    return { schedule: sched, trackStart: new Date(cursor) };
  }

  let videoSchedule = [], postcardSchedule = [], mainSchedule = [], addonSchedule = [];
  let projectStart, videoTrackStart, postcardTrackStart;

  if (isParallel) {
    // Addons chain off the end of the due date (after video track)
    // Work backwards: due date → addons → video track end, and due date → postcard track end (independent)
    // First figure out how much time addons need
    let addonCursor = new Date(dueDate);
    if (addonPhases.length > 0) {
      const { schedule, trackStart } = scheduleBackwards(addonPhases, addonCursor);
      addonSchedule = schedule;
      addonCursor = new Date(trackStart); // video track must end by here
    }

    // Schedule video and postcard tracks both ending at addonCursor (or dueDate if no addons)
    const videoResult = scheduleBackwards(videoPhases, addonCursor);
    videoSchedule = videoResult.schedule;
    videoTrackStart = videoResult.trackStart;

    const postcardResult = scheduleBackwards(postcardPhases, addonCursor);
    postcardSchedule = postcardResult.schedule;
    postcardTrackStart = postcardResult.trackStart;

    // Project starts at the earlier of the two track starts
    projectStart = videoTrackStart <= postcardTrackStart ? new Date(videoTrackStart) : new Date(postcardTrackStart);

  } else {
    // Single sequential track: main or video-only or postcard-only
    const allSequential = [...mainPhases, ...videoPhases, ...postcardPhases, ...addonPhases];
    const { schedule, trackStart } = scheduleBackwards(allSequential, dueDate);
    mainSchedule = schedule;
    projectStart = new Date(trackStart);
  }

  // --- Build milestone list, sorted by date ---
  const milestones = [];

  function pushPhaseMilestones(sched, colorOffset = 0) {
    sched.forEach(({ ph, phaseStart, phaseEnd, bufferEnd }, i) => {
      const colorIdx = (i + colorOffset) % PHASE_COLORS.length;
      milestones.push({
        type: 'phase-start',
        date: new Date(phaseStart),
        phase: ph.name,
        track: ph.track,
        title: `${ph.name} begins`,
        detail: `${ph.duration} working day${ph.duration !== 1 ? 's' : ''}`,
        tags: [],
        colorIdx,
      });
      if (ph.deliverable) {
        milestones.push({
          type: 'deliverable',
          date: new Date(phaseEnd),
          phase: ph.name,
          track: ph.track,
          title: ph.deliverable,
          detail: `Deliverable due — end of ${ph.name}`,
          tags: ['deliverable'],
          colorIdx,
        });
      } else {
        milestones.push({
          type: 'phase-end',
          date: new Date(phaseEnd),
          phase: ph.name,
          track: ph.track,
          title: `${ph.name} complete`,
          detail: `Phase closes`,
          tags: [],
          colorIdx,
        });
      }
      if (bufferEnd) {
        milestones.push({
          type: 'buffer',
          date: new Date(bufferEnd),
          phase: ph.name,
          track: ph.track,
          title: 'Review & Revision Window',
          detail: `${ph.buffer} day${ph.buffer !== 1 ? 's' : ''} buffer · feedback / amends`,
          tags: ['review'],
          colorIdx,
        });
      }
    });
  }

  milestones.push({
    type: 'kickoff',
    date: new Date(projectStart),
    phase: '', track: '',
    title: 'Project Kickoff',
    detail: `${name}${client ? ' · ' + client : ''}`,
    tags: ['kickoff'],
    colorIdx: -1,
  });

  if (isParallel) {
    pushPhaseMilestones(videoSchedule, 0);
    pushPhaseMilestones(postcardSchedule, 2);
    pushPhaseMilestones(addonSchedule, 4);
  } else {
    pushPhaseMilestones(mainSchedule, 0);
  }

  milestones.push({
    type: 'wrap',
    date: new Date(dueDate),
    phase: '', track: '',
    title: 'Due Date',
    detail: 'All deliverables complete',
    tags: ['deliverable'],
    colorIdx: -1,
  });

  // Sort by date, kickoff always first, wrap always last
  milestones.sort((a, b) => {
    if (a.type === 'kickoff') return -1;
    if (b.type === 'kickoff') return 1;
    if (a.type === 'wrap') return 1;
    if (b.type === 'wrap') return -1;
    return a.date - b.date;
  });

  // Totals
  const allSched = [...videoSchedule, ...postcardSchedule, ...mainSchedule, ...addonSchedule];
  const totalDays = allSched.reduce((s, { ph }) => s + ph.duration, 0);
  const totalBuffer = allSched.reduce((s, { ph }) => s + ph.buffer, 0);

  // --- Render ---
  const ptLabel = projectType ? projectType.charAt(0).toUpperCase()+projectType.slice(1) : '';
  const deliverableLabel = [...selectedPrimary, withLibrary ? 'Library Videos' : '', withTranslation ? 'Translation' : ''].filter(Boolean).join(' + ');
  document.getElementById('outTitle').textContent = name;
  document.getElementById('outMeta').innerHTML =
    `${client ? client + '<br>' : ''}${deliverableLabel ? deliverableLabel + ' · ' : ''}${ptLabel}<br>Due: ${fmtDate(dueDate)}<br>${perWeek}‑day work week`;

  document.getElementById('outDeliverables').textContent =
    deliverableLabel
      ? `${ptLabel ? ptLabel + ' · ' : ''}${deliverableLabel} · Project start: ${fmtDate(projectStart)}`
      : `Project start: ${fmtDate(projectStart)}`;

  const list = document.getElementById('milestoneList');
  list.innerHTML = '';

  milestones.forEach(m => {
    const color = m.colorIdx >= 0
      ? `var(${PHASE_COLORS[m.colorIdx]})`
      : (m.type === 'wrap' ? 'var(--ink)' : 'var(--muted)');
    const li = document.createElement('li');
    li.className = 'milestone';
    if (m.type === 'wrap') li.style.background = 'var(--accent-light)';
    const tagHtml = m.tags.map(t => `<span class="milestone-tag tag-${t}">${t}</span>`).join('');
    const trackBadge = m.track === 'video' ? `<span class="milestone-tag" style="border-color:var(--phase-3);color:var(--phase-3);">video</span>`
                     : m.track === 'postcard' ? `<span class="milestone-tag" style="border-color:var(--phase-4);color:var(--phase-4);">postcard</span>`
                     : '';
    li.innerHTML = `
      <div class="milestone-date-col">
        <span class="milestone-date">
          <strong>${fmtDateShort(m.date)}</strong>
          ${fmtDay(m.date)}
        </span>
      </div>
      <div class="milestone-body">
        <div class="milestone-label">
          <span class="dot" style="background:${color}"></span>
          ${m.phase ? `<span class="milestone-phase">${m.phase}</span>` : ''}
        </div>
        <div class="milestone-title">${m.title}</div>
        <div class="milestone-detail">${m.detail}</div>
        ${trackBadge}${tagHtml}
      </div>
    `;
    list.appendChild(li);
  });

  const totalCalDays = Math.round((dueDate - projectStart) / (1000*60*60*24));
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><span class="val">${fmtDateShort(projectStart)}</span><span class="lbl">Project Start</span></div>
    <div class="summary-stat"><span class="val">${phases.length}</span><span class="lbl">Phases</span></div>
    <div class="summary-stat"><span class="val">${totalDays}</span><span class="lbl">Working Days</span></div>
    <div class="summary-stat"><span class="val">${totalBuffer}</span><span class="lbl">Buffer Days</span></div>
    <div class="summary-stat"><span class="val">${totalCalDays}</span><span class="lbl">Calendar Days Total</span></div>
    <div class="summary-stat"><span class="val">${fmtDateShort(dueDate)}</span><span class="lbl">Due Date</span></div>
  `;

  // --- Build email table rows ---
  // One row per phase-start milestone (represents the task and its due date)
  // Use phaseEnd date as the date shown (when it's due), owner from PHASE_OWNER map
  const emailRows = document.getElementById('emailRows');
  emailRows.innerHTML = '';

  // Title row
  const titleRow = document.createElement('tr');
  titleRow.innerHTML = `
    <td colspan="3" contenteditable="true" style="padding:0.75rem 0.75rem 0.75rem 0;font-family:var(--font-serif);font-size:1rem;font-weight:600;border-bottom:1px solid var(--rule);">${name}${client ? ' — ' + client : ''}</td>
  `;
  emailRows.appendChild(titleRow);

  // One row per phase, using the sorted milestone list (phase-start entries only, plus wrap)
  const emailMilestones = milestones.filter(m => m.type === 'phase-start' || m.type === 'wrap');

  emailMilestones.forEach((m, i) => {
    const isWrap = m.type === 'wrap';
    const clientLabel = client || 'Client';
    const owner = isWrap ? 'Flimp' : (PHASE_OWNER[m.phase] === 'Client' ? clientLabel : 'Flimp');
    const taskLabel = isWrap ? 'Final deliverables complete' : m.phase;
    // Use phaseEnd date: find the next milestone after this phase-start that marks its close
    let displayDate = m.date;
    if (!isWrap) {
      const nextClose = milestones.find(x =>
        (x.type === 'phase-end' || x.type === 'deliverable' || x.type === 'buffer') &&
        x.phase === m.phase && x.date >= m.date
      );
      if (nextClose) displayDate = nextClose.date;
    }

    const isEven = i % 2 === 0;
    const ownerColor = owner === 'Flimp' ? 'var(--phase-3)' : 'var(--accent)';
    const tr = document.createElement('tr');
    tr.style.background = isEven ? 'transparent' : 'var(--warm)';
    tr.innerHTML = `
      <td contenteditable="true" style="padding:0.5rem 0.75rem 0.5rem 0;border-bottom:1px solid var(--rule);color:${ownerColor};font-weight:500;">${owner}</td>
      <td contenteditable="true" style="padding:0.5rem 0.75rem;border-bottom:1px solid var(--rule);">${taskLabel}</td>
      <td contenteditable="true" style="padding:0.5rem 0 0.5rem 0.75rem;border-bottom:1px solid var(--rule);white-space:nowrap;">${fmtDateShort(displayDate)}</td>
    `;
    emailRows.appendChild(tr);
  });

  // Hide email table on regenerate
  document.getElementById('emailTable').style.display = 'none';
  document.getElementById('btnEmailTable').textContent = 'Show Email Version';

  const out = document.getElementById('output');
  out.classList.add('visible');
  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleEmailTable() {
  const el = document.getElementById('emailTable');
  const btn = document.getElementById('btnEmailTable');
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? 'block' : 'none';
  btn.textContent = hidden ? 'Hide Email Version' : 'Show Email Version';
  if (hidden) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyEmailText() {
  const projectTitle = document.querySelector('#emailRows tr:first-child td').textContent.trim();
  const rows = [...document.querySelectorAll('#emailRows tr')].slice(1);
  const lines = rows.map(tr => {
    const cells = [...tr.querySelectorAll('td')].map(td => td.textContent.trim());
    return cells.join('\t');
  });
  const text = projectTitle + '\n' + lines.join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
  });
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('startDate').value = `${yyyy}-${mm}-${dd}`;
});
</script>
